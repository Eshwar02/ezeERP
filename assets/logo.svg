  <defs>
    <linearGradient id="bg" x1="760" y1="230" x2="1160" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50C69E"/>
      <stop offset="100%" stop-color="#3574B9"/>
    </linearGradient>
  </defs>
