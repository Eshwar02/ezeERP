<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- White background -->
  <rect width="1920" height="1080" fill="#ffffff"/>

  <!-- Icon mark, centered at (960, 430) -->
  <rect x="760" y="230" width="400" height="400" rx="88" fill="url(#bg)"/>
  <text x="960" y="490" font-family="system-ui, -apple-system, sans-serif" font-weight="900"
        font-size="230" fill="white" text-anchor="middle" dominant-baseline="middle">e</text>

  <!-- Wordmark -->
  <text x="960" y="730" font-family="system-ui, -apple-system, sans-serif" font-weight="900"
        font-size="180" text-anchor="middle">
    <tspan fill="#50C69E">eze</tspan><tspan fill="#3574B9">ERP</tspan>
  </text>

  <!-- Tagline -->
  <text x="960" y="860" font-family="system-ui, -apple-system, sans-serif" font-size="52"
